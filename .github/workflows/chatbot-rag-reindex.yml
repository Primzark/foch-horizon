name: Chatbot RAG Reindex

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
      - master
    paths:
      - "public/sitemap.xml"
      - "src/features/content/**"
      - "src/features/cities/data/**"
      - "src/features/listings/data/**"
      - "scripts/chatbot/**"
      - ".github/workflows/chatbot-rag-reindex.yml"

jobs:
  reindex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RAG_EMBEDDING_PROVIDER: gemini
      RAG_INDEX_BASE_URL: "${{ secrets.RAG_INDEX_BASE_URL || 'https://foch-horizon.vercel.app' }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (runtime only)
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Validate required secrets
        run: |
          missing=0
          for name in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY GEMINI_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Re-index website content (headless)
        run: npm run chatbot:index:site -- --headless
